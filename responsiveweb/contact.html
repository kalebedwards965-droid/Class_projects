    <main>
        <h2>Send a Message</h2>
        <form action="#">
            <p>
                Name: <br>
                <input type="text" name="name" required>
            </p>
            <p>
                Email: <br>
                <input type="email" name="email" required>
            </p>
            <p>
                Message: <br>
                <textarea name="message" rows="5" cols="30" required></textarea>
            </p>
            <p>
                <input type="submit" value="Submit Form">
            </p>
        </form>
    </main>
